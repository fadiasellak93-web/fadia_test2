<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fadia Test - PR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("4RHKeJ66ijZvoWn68");
})();

function sendAnswer(answer){

var studentName = document.getElementById("studentName").value;

if(studentName === ""){
alert("الرجاء كتابة الاسم أولا");
return;
}

var templateParams = {
name: studentName,
answer: answer
};

emailjs.send("service_16mtzdi","template_dclzub6",templateParams)
.then(function(response){
alert("تم إرسال الإجابة بنجاح 🌸");
}, function(error){
alert("حدث خطأ ❌");
console.log(error);
});
}
</script>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ffb6d9,#ffd6ec);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:380px;
padding:30px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

h1{
color:#d63384;
margin:5px 0;
}

.university{
font-size:13px;
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:12px;
border:2px solid #ffc2e0;
font-size:15px;
}

input:focus{
border-color:#d63384;
outline:none;
}

.question{
font-weight:bold;
margin-bottom:15px;
color:#333;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:15px;
font-size:16px;
cursor:pointer;
transition:0.3s;
color:white;
background:#d63384;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

.footer{
margin-top:20px;
font-size:12px;
color:#999;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo">

<h1>🌸 Fadia Test 🌸</h1>

<div class="university">
Public Relations Student 🎓 <br>
University of Djillali Liabes - Sidi Bel Abbes
</div>

<input type="text" id="studentName" placeholder="اكتبي اسمك هنا">

<div class="question">
ما هو الدور الأساسي للعلاقات العامة؟
</div>

<button onclick="sendAnswer('Building Public Image')">
Building Public Image
</button>

<button onclick="sendAnswer('Media Communication')">
Media Communication
</button>

<button onclick="sendAnswer('Crisis Management')">
Crisis Management
</button>

<div class="footer">
Designed with 💕 by Fadia
</div>

</div>

</body>
</html>
